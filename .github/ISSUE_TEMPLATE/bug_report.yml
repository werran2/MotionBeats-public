name: Bug report
description: Report a MotionBeats app problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include passwords, tokens, private audio, or other sensitive information.
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Example: 1.01
      placeholder: "1.01"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and OS version
      placeholder: "Pixel 8, Android 15"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open MotionBeats
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error message if the app shows one.
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshot or recording
      description: Drag files here if they do not contain private information.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional notes
      description: Anything else that may help reproduce the issue.
    validations:
      required: false
